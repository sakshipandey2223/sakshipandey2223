<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b16"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow3" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" rx="16" fill="url(#bg3)" stroke="#1c2942" stroke-width="1.5"/>

  <text x="40" y="42" font-family="'Segoe UI', Verdana, sans-serif" font-weight="700" font-size="18" fill="#e7f6ff">HCLTech</text>
  <text x="40" y="62" font-family="Consolas, monospace" font-size="12.5" fill="#5c7ba0">Analyst, AI, Automation &amp; Infrastructure &#8226; Aug 2022 - Present &#8226; Lucknow, India</text>

  <!-- main track -->
  <line x1="60" y1="130" x2="1140" y2="130" stroke="#1c2942" stroke-width="4"/>
  <line x1="60" y1="130" x2="1140" y2="130" stroke="url(#lineGrad)" stroke-width="4" stroke-dasharray="1140" stroke-dashoffset="1140">
    <animate attributeName="stroke-dashoffset" from="1140" to="0" dur="2.4s" fill="freeze"/>
  </line>

  <!-- milestone nodes -->
  <g font-family="'Segoe UI', Verdana, sans-serif">
    <!-- node 1 -->
    <circle cx="160" cy="130" r="9" fill="#080d18" stroke="#00e5ff" stroke-width="3" filter="url(#glow3)">
      <animate attributeName="r" values="9;11;9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <line x1="160" y1="139" x2="160" y2="168" stroke="#264063" stroke-width="1.5"/>
    <text x="160" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#7ce9ff">Onboarded</text>
    <text x="160" y="206" text-anchor="middle" font-size="11.5" fill="#5c7ba0">Infra &amp; automation ops</text>

    <!-- node 2 -->
    <circle cx="440" cy="130" r="9" fill="#080d18" stroke="#00e5ff" stroke-width="3" filter="url(#glow3)">
      <animate attributeName="r" values="9;11;9" dur="2.6s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <line x1="440" y1="121" x2="440" y2="92" stroke="#264063" stroke-width="1.5"/>
    <text x="440" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#7ce9ff">Automation at Scale</text>
    <text x="440" y="62" text-anchor="middle" font-size="11.5" fill="#5c7ba0">45% manual effort reduced</text>

    <!-- node 3 -->
    <circle cx="720" cy="130" r="9" fill="#080d18" stroke="#a78bfa" stroke-width="3" filter="url(#glow3)">
      <animate attributeName="r" values="9;11;9" dur="2.2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <line x1="720" y1="139" x2="720" y2="168" stroke="#264063" stroke-width="1.5"/>
    <text x="720" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#c7b3ff">RAG Systems</text>
    <text x="720" y="206" text-anchor="middle" font-size="11.5" fill="#5c7ba0">Enterprise knowledge search</text>

    <!-- node 4 -->
    <circle cx="1000" cy="130" r="9" fill="#080d18" stroke="#a78bfa" stroke-width="3" filter="url(#glow3)">
      <animate attributeName="r" values="9;11;9" dur="2.8s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <line x1="1000" y1="121" x2="1000" y2="92" stroke="#264063" stroke-width="1.5"/>
    <text x="1000" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#c7b3ff">Multi-Agent Systems</text>
    <text x="1000" y="62" text-anchor="middle" font-size="11.5" fill="#5c7ba0">Production deployments</text>

    <!-- present marker -->
    <circle cx="1120" cy="130" r="7" fill="#00ff9c" filter="url(#glow3)">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="1120" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#00ff9c">NOW</text>
  </g>
</svg>
